# PostGIS 17-x.x extends Postgres 17 with spatial functions (ST_Distance, KNN via <->).
# Postgres 17 is the latest version supported by Airflow.

services:

  # ------------------------------------------------------------------------------------
  # Postgres (PostGIS)
  # ------------------------------------------------------------------------------------

  postgres_service:
    container_name: postgres_container
    image: postgis/postgis:17-3.5
    restart: always
    shm_size: 256mb # TODO[prod]: benchmark with real workload (memory for Postgres operations)
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:${POSTGRES_PORT}"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro # executed only on empty volume

    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_root_password
      POSTGRES_USER_FILE: /run/secrets/postgres_root_username
      POSTGRES_DB: "${AIRFLOW_DB_NAME}"
      POSTGRES_DB_NAME: "${POSTGRES_DB_NAME}" # read by custom init script (postgres/init/)

    healthcheck:
      test: [ "CMD-SHELL", "USER=$$(cat /run/secrets/postgres_root_username); pg_isready -U $$USER -d ${AIRFLOW_DB_NAME} && pg_isready -U $$USER -d ${POSTGRES_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    secrets:
      - postgres_root_password
      - postgres_root_username

  # ------------------------------------------------------------------------------------
  # Airflow (standalone: scheduler + webserver + triggerer)
  # ------------------------------------------------------------------------------------

  airflow_service:
    container_name: airflow_container
    build:
      context: .
      dockerfile: airflow.Dockerfile
      args:
        # https://airflow.apache.org/docs/docker-stack/build-arg-ref.html
        AIRFLOW_USE_UV: True
        INSTALL_MYSQL_CLIENT: False
        INSTALL_MSSQL_CLIENT: False
    restart: always
    depends_on:
      postgres_service:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

    # -- Environment (contextual config, varies between dev / prod) --------------------
    # Structural config lives in airflow.Dockerfile (ENV).

    environment:

      # -- Project database (pydantic Settings → loaders/postgres.py) ------------------
      POSTGRES_HOST: "postgres_service"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_DB_NAME: "${POSTGRES_DB_NAME}"
      AIRFLOW_DB_NAME: "${AIRFLOW_DB_NAME}"

      # -- Logging ---------------------------------------------------------------------
      # Airflow 3 logging (vérifié sur 3.1.7) :
      #   - Timestamp ISO 8601 + level ajoutés par structlog
      #     (MaybeTimeStamper(fmt="iso") + add_log_level). Les loggers
      #     applicatifs ne doivent émettre que le message brut.
      #   - Task logs transitent par pipe JSON vers le supervisor.
      #   - LOG_FORMATTER_CLASS est dead config (remplacé par structlog).
      #   - LOGGING_CONFIG_CLASS : utilité limitée (écrasé par structlog).

      AIRFLOW__LOGGING__LOGGING_LEVEL: "${LOGGING_LEVEL}"

      # Percent-style → PercentFormatRender.
      # Si absent → ConsoleRenderer (aligné, coloré).
      # AIRFLOW__LOGGING__LOG_FORMAT: "%(asctime)s --- %(levelname)-8s --- %(message)s"

      # Format pour les commandes CLI (backfill, task run) et daemon.
      # AIRFLOW__LOGGING__SIMPLE_LOG_FORMAT: "%(asctime)s --- %(levelname)-8s --- %(message)s"

      # -- Airflow internal database ---------------------------------------------------
      # printf "%s" avoids interpreting % in secrets as format specifiers.
      # $$ escapes $ for Compose: passes a literal $ to the container shell,
      # so $$(cat ...) and $${VAR} are evaluated at runtime, not at parse-time.
      # All variables used here must be declared above in this environment: block.
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_CMD: "bash -c 'printf \"%s\" \"postgresql+psycopg://$$(cat /run/secrets/postgres_root_username):$$(cat /run/secrets/postgres_root_password)@$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${AIRFLOW_DB_NAME}\"'"

      # -- Authentication & API --------------------------------------------------------
      AIRFLOW__API__SECRET_KEY_SECRET: /run/secrets/airflow_api_secret_key
      # JWT key shared by all components (scheduler log server ↔ api-server).
      # Without this, each derives its own ephemeral key → signature failure.
      AIRFLOW__API_AUTH__JWT_SECRET_KEY_SECRET: /run/secrets/airflow_api_secret_key
      AIRFLOW__API_AUTH__JWT_ISSUER: "http://airflow-standalone"

      # Note: AIRFLOW_CONN_*_CMD is NOT supported (only AIRFLOW__SECTION__KEY_CMD).
      # AIRFLOW_CONN_PROJECT_POSTGRES is exported in the startup command below,
      # built from Docker secrets at runtime — no plaintext credentials in compose.
      # The connection id must match loaders/pg_connection.py::AIRFLOW_CONN_ID.

    # -- Volumes -----------------------------------------------------------------------

    # TODO[prod]: replace bind mounts with named volumes (airflow_data, etc.)
    # and configure AIRFLOW__CORE__DAGS_FOLDER instead of bind-mounting dags/
    volumes:
      - ./src/data_eng_etl_electricity_meteo/airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src:ro
      - ./data:/opt/airflow/data
      - ./postgres:/opt/airflow/postgres # ingestion SQL queries via Airflow
      - ./dbt:/opt/airflow/dbt

    # -- Health check ------------------------------------------------------------------

    healthcheck:
      # https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/logging-monitoring/check-health.html
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/api/v2/monitor/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # -- Startup (exports secrets then launches Airflow) -------------------------------

    command:
      - bash
      - -c
      - |
        AIRFLOW_CONN_PROJECT_POSTGRES="postgresql+psycopg://$$(cat /run/secrets/postgres_root_username):$$(cat /run/secrets/postgres_root_password)@$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB_NAME}"
        POSTGRES_USER="$$(cat /run/secrets/postgres_root_username)"
        POSTGRES_PASSWORD="$$(cat /run/secrets/postgres_root_password)"
        export AIRFLOW_CONN_PROJECT_POSTGRES POSTGRES_USER POSTGRES_PASSWORD
        exec airflow standalone

    secrets:
      - postgres_root_password
      - postgres_root_username
      - airflow_api_secret_key

# --------------------------------------------------------------------------------------
# Secrets (Docker secrets from local files)
# --------------------------------------------------------------------------------------

secrets:
  postgres_root_password:
    file: secrets/postgres_root_password
  postgres_root_username:
    file: secrets/postgres_root_username
  airflow_api_secret_key:
    file: secrets/airflow_api_secret_key

# --------------------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------------------

volumes:
  postgres_data:
  # airflow_data: # TODO[prod]: enable named volume for data persistence
