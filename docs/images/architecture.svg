<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="1100" height="500" rx="12" fill="#f8fafc"/>

  <!-- ==================== SOURCES ==================== -->
  <rect x="30" y="30" width="180" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="120" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Sources ouvertes</text>
  <line x1="50" y1="68" x2="190" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="48" y="82" width="144" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="120" y="103" text-anchor="middle" font-weight="600" fill="#1e40af">IGN</text>
  <text x="120" y="119" text-anchor="middle" font-size="11" fill="#64748b">Contours IRIS (7z)</text>

  <rect x="48" y="146" width="144" height="50" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="120" y="167" text-anchor="middle" font-weight="600" fill="#166534">ODRE</text>
  <text x="120" y="183" text-anchor="middle" font-size="11" fill="#64748b">eco2mix, installations</text>

  <rect x="48" y="210" width="144" height="50" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="120" y="231" text-anchor="middle" font-weight="600" fill="#854d0e">Météo France</text>
  <text x="120" y="247" text-anchor="middle" font-size="11" fill="#64748b">stations, climatologie</text>

  <!-- ==================== ETL PYTHON ==================== -->
  <rect x="270" y="30" width="350" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="445" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">ETL Python</text>
  <line x1="290" y1="68" x2="600" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="288" y="88" width="150" height="56" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="363" y="112" text-anchor="middle" font-weight="600" fill="#7c3aed">Téléchargement</text>
  <text x="363" y="130" text-anchor="middle" font-size="11" fill="#64748b">httpx, smart-skip</text>

  <rect x="288" y="164" width="150" height="56" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="363" y="188" text-anchor="middle" font-weight="600" fill="#c2410c">Bronze</text>
  <text x="363" y="206" text-anchor="middle" font-size="11" fill="#64748b">Polars, DuckDB</text>

  <rect x="460" y="164" width="142" height="56" rx="6" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="531" y="188" text-anchor="middle" font-weight="600" fill="#0369a1">Silver</text>
  <text x="531" y="206" text-anchor="middle" font-size="11" fill="#64748b">validation, typage</text>

  <!-- Arrow: Download -> Bronze (vertical) -->
  <line x1="363" y1="144" x2="363" y2="160" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="363,164 358,157 368,157" fill="#94a3b8"/>
  <text x="390" y="156" font-size="9" fill="#94a3b8">Landing</text>

  <!-- Arrow: Bronze -> Silver (horizontal) -->
  <line x1="438" y1="192" x2="456" y2="192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="460,192 453,187 453,197" fill="#94a3b8"/>
  <text x="449" y="183" text-anchor="middle" font-size="9" fill="#94a3b8">Parquet</text>

  <!-- ==================== STOCKAGE ==================== -->
  <rect x="680" y="30" width="170" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="765" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Stockage</text>
  <line x1="700" y1="68" x2="830" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="698" y="88" width="134" height="56" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="765" y="112" text-anchor="middle" font-weight="600" fill="#065f46">Parquet</text>
  <text x="765" y="130" text-anchor="middle" font-size="11" fill="#64748b">versionné + latest</text>

  <rect x="698" y="164" width="134" height="56" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="765" y="188" text-anchor="middle" font-weight="600" fill="#334155">PostgreSQL</text>
  <text x="765" y="206" text-anchor="middle" font-size="11" fill="#64748b">PostGIS 3.5</text>

  <!-- ==================== GOLD ==================== -->
  <rect x="910" y="30" width="160" height="270" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="990" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">ELT</text>
  <line x1="930" y1="68" x2="1050" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="928" y="164" width="124" height="56" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="990" y="188" text-anchor="middle" font-weight="600" fill="#92400e">Gold</text>
  <text x="990" y="206" text-anchor="middle" font-size="11" fill="#64748b">dbt + PostGIS</text>

  <!-- ==================== ARROWS BETWEEN SECTIONS ==================== -->

  <!-- Sources -> Téléchargement -->
  <line x1="210" y1="116" x2="284" y2="116" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="288,116 281,111 281,121" fill="#94a3b8"/>

  <!-- Silver -> Parquet (diagonal up) -->
  <line x1="602" y1="180" x2="694" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="698,118 689,116 693,124" fill="#94a3b8"/>

  <!-- Silver -> Postgres (horizontal) -->
  <line x1="602" y1="192" x2="694" y2="192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="698,192 691,187 691,197" fill="#94a3b8"/>
  <text x="650" y="184" text-anchor="middle" font-size="10" fill="#94a3b8">COPY / UPSERT</text>

  <!-- Postgres -> Gold -->
  <line x1="832" y1="192" x2="924" y2="192" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="928,192 921,187 921,197" fill="#94a3b8"/>

  <!-- ==================== ORCHESTRATION BAR ==================== -->
  <rect x="30" y="330" width="1040" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="36" y="336" width="10" height="48" rx="3" fill="#017cee"/>
  <text x="60" y="358" font-weight="600" fill="#334155" font-size="14">Apache Airflow 3</text>
  <text x="60" y="376" font-size="11" fill="#64748b">DAGs dynamiques depuis catalog.yaml &#183; Assets (lineage) &#183; LocalExecutor &#183; structlog</text>

  <!-- ==================== TOOLS BAR ==================== -->
  <rect x="30" y="410" width="1040" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="36" y="416" width="10" height="48" rx="3" fill="#334155"/>
  <text x="60" y="438" font-weight="600" fill="#334155" font-size="14">Qualité et Outillage</text>
  <text x="60" y="456" font-size="11" fill="#64748b">ruff (lint/format) &#183; ty (type check) &#183; pytest + coverage &#183; prek (pre-commit) &#183; DataFrameModel &#183; tests dbt</text>

</svg>
