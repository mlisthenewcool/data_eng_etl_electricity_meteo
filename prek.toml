# pass_filenames: false # to run every test, even if files aren't modified

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff-check"
entry = "uv run ruff check"
args = ["--fix"]
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "docstring-format"
name = "docstring-format"
entry = "uv run python scripts/format_docstrings.py --check notebooks/ scripts/ src/ tests/"
language = "system"
pass_filenames = false
files = '\.(py)$'

[[repos.hooks]]
id = "ty"
name = "ty"
entry = "uv run ty check"
language = "system"
types = ["python"]
# hack: 'exclude' in pyproject.toml is somehow not read
# better than 'pass_filenames: false' for performance
# preventing prek from checking the whole project everytime
files = "^(notebooks|scripts|src|tests)/"

[[repos.hooks]]
id = "pytest"
name = "pytest"
entry = "uv run pytest"
language = "system"
pass_filenames = false
files = '\.(py|yaml|json)$' # run the hook only if any .(py|yaml|json) changed
#stages: [ pre-push ] # if tests are taking too much time

[[repos.hooks]]
id = "dbt-parse"
name = "dbt-parse"
entry = "uv run run-dbt parse"
language = "system"
pass_filenames = false
files = '^dbt/'
stages = ["pre-push"]

[[repos.hooks]]
id = "pip-audit"
name = "pip-audit"
# CVE-2025-62727: starlette 0.48.0, transitive dep of Airflow (dev only)
entry = "uv run pip-audit --ignore-vuln CVE-2025-62727"
language = "system"
pass_filenames = false
files = '(pyproject\.toml|uv\.lock)$'
stages = ["pre-push"]