[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff-check"
entry = "uv run ruff check"
args = ["--fix", "--force-exclude"]
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ty"
name = "ty"
entry = "uv run ty check"
language = "system"
types = ["python"]
files = "^(src|tests)/"

[[repos.hooks]]
id = "pytest"
name = "pytest"
entry = "uv run pytest"
language = "system"
pass_filenames = false
files = '\.(py|yaml|json)$'