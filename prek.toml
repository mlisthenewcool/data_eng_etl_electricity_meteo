[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff-check"
entry = "uv run ruff check"
args = ["--fix", "--force-exclude"]
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ty"
name = "ty"
entry = "uv run ty check"
language = "system"
types = ["python"]
files = "^(src|tests)/"

[[repos.hooks]]
id = "docstring-format"
name = "docstring-format"
entry = "uv run python scripts/format_docstrings.py --check src/ tests/"
language = "system"
pass_filenames = false
files = '\.(py)$'

[[repos.hooks]]
id = "pytest"
name = "pytest"
entry = "uv run pytest"
language = "system"
pass_filenames = false
files = '\.(py|yaml|json)$'

[[repos.hooks]]
id = "dbt-compile"
name = "dbt-compile"
entry = "scripts/dbt.sh compile"
language = "system"
pass_filenames = false
files = '^dbt/'

[[repos.hooks]]
id = "pip-audit"
name = "pip-audit"
# CVE-2025-62727: starlette 0.48.0, transitive dep of Airflow (dev only)
entry = "uv run pip-audit --ignore-vuln CVE-2025-62727"
language = "system"
pass_filenames = false
files = '(pyproject\.toml|uv\.lock)$'