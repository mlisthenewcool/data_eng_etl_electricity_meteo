# Single target — actual values differ through env vars set by the caller
# (Docker Compose for Airflow, run-dbt entry point for local).
# env_var() returns a string; '| int' casts to integer where the adapter expects one.
data_eng:
  target: default
  outputs:
    default:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB_NAME') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      schema: gold
      threads: 4
