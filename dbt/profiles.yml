config:
  send_anonymous_usage_stats: false

# All env vars are required (no defaults) — missing vars cause an immediate error.
# env_var() returns a string; '| int' casts to integer where the adapter expects one.
#
# The docker and local targets share the same template intentionally:
# the actual values differ through the env vars loaded by the caller
# (Docker Compose for docker, scripts/dbt.sh + .env.local for local).
data_eng:
  target: docker
  outputs:
    docker:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"  # cast to int for adapter
      dbname: "{{ env_var('POSTGRES_DB_NAME') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      schema: gold
      threads: 2
    local:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"  # cast to int for adapter
      dbname: "{{ env_var('POSTGRES_DB_NAME') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      schema: gold
      threads: 2
