# $schema: https://raw.githubusercontent.com/dbt-labs/dbt-jsonschema/main/schemas/latest/dbt_yml_files-latest.json
version: 2

models:
  - name: installations_renouvelables_avec_stations_meteo
    description: >
      Chaque installation renouvelable active (solaire/éolien) associée à la station
      météo la plus proche capable de mesurer les paramètres pertinents.
      Jointure spatiale PostGIS KNN via l'opérateur <->.
    columns:
      - name: code_eic_resource_object
        description: "Identifiant unique de l'installation (code EIC ou clé synthétique pour les agrégations)."
        tests:
          - unique
          - not_null
      - name: type_energie
        description: "Type d'énergie renouvelable."
        tests:
          - accepted_values:
              arguments:
                values: ['solaire', 'eolien']
      - name: station_id
        description: "Identifiant de la station météo la plus proche."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_stations_meteo')
                field: station_id
      - name: distance_km
        description: "Distance en km entre l'installation et la station météo."
        tests:
          - not_null
