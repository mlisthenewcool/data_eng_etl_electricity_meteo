# Defense-in-depth: column constraints on raw source tables.
# Source of truth for constraints: Python DataFrameModel (validates pre-write).
# These dbt tests are a post-load safety net in Postgres.
# Synchronization enforced by tests/test_dbt_consistency.py.

version: 2

sources:
  - name: silver
    schema: silver
    tables:
      - name: dim_installations
        description: "Installations de production d'électricité (source ODRE)."
        columns:
          - name: code_eic_resource_object
            tests:
              - unique
              - not_null
          - name: type_energie
            tests:
              - not_null

      - name: dim_stations_meteo
        description: "Stations météorologiques Météo France."
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: latitude
            tests:
              - not_null
          - name: longitude
            tests:
              - not_null

      - name: dim_contours_iris
        description: "Contours IRIS IGN avec centroïdes WGS84."
        columns:
          - name: code_iris
            tests:
              - unique
              - not_null
          - name: geom_wkb
            tests:
              - not_null
          - name: centroid_lat
            tests:
              - not_null
          - name: centroid_lon
            tests:
              - not_null
          - name: type_iris
            tests:
              - accepted_values:
                  values: ["H", "A", "D", "Z"]

      - name: fact_eco2mix_cons_def
        description: "Production électrique régionale eco2mix (consolidées et définitives)."
        columns:
          - name: code_insee_region
            tests:
              - not_null
          - name: date_heure
            tests:
              - not_null

      - name: fact_eco2mix_tr
        description: "Production électrique régionale eco2mix (temps réel)."
        columns:
          - name: code_insee_region
            tests:
              - not_null
          - name: date_heure
            tests:
              - not_null

      - name: fact_meteo_horaire
        description: "Données climatologiques horaires Météo France."
        columns:
          - name: id_station
            tests:
              - not_null
          - name: date_heure
            tests:
              - not_null
