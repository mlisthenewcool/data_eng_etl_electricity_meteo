# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Cooldown: wait 7 days before proposing a bump so that freshly published
# releases (and potential zero-day regressions) age out. Security updates
# bypass the cooldown by default.
#
# Shared schedule/cooldown config is factored via YAML anchors (&schedule,
# &cooldown) defined on the first entry and referenced by the others.

version: 2
updates:
  # -- Python dependencies (pyproject.toml + uv.lock) --------------------------------
  - package-ecosystem: "uv"
    directory: "/"
    schedule: &schedule
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    cooldown: &cooldown
      default-days: 7
    groups:
      python:
        patterns: [ "*" ]

  # -- GitHub Actions (pinned by commit SHA) -----------------------------------------
  # Dependabot updates the SHA and refreshes the `# vX.Y.Z` comment automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: *schedule
    cooldown: *cooldown
    groups:
      actions:
        patterns: [ "*" ]

  # -- Dockerfile base images (FROM ...) ---------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule: *schedule
    cooldown: *cooldown
    groups:
      docker:
        patterns: [ "*" ]

  # -- docker-compose images (image: ...) --------------------------------------------
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule: *schedule
    cooldown: *cooldown
    groups:
      docker-compose:
        patterns: [ "*" ]
