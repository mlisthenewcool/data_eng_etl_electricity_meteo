name: CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  quality:
    name: Code quality & tests
    runs-on: ubuntu-latest
    env:
      # Dummy credentials for dbt parse (no DB connection needed)
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB_NAME: ci_dummy
      POSTGRES_USER: ci_dummy
      POSTGRES_PASSWORD: ci_dummy
    steps:
      - uses: actions/checkout@v6

      # https://github.com/actions/setup-python
      # https://docs.astral.sh/uv/guides/integration/github/#setting-up-python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: 'auto'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Linter (ruff check)
        run: uv run ruff check --output-format=github

      - name: Formatter (ruff format)
        run: uv run ruff format --check

      - name: Docstring formatting
        run: uv run python scripts/format_docstrings.py --check notebooks/ scripts/ src/ tests/

      - name: Type checking (ty)
        run: uv run ty check

      - name: Test coverage (pytest)
        env:
          # Override pytest-cov settings (in pyproject.toml) for a cleaner CI summary
          PYTEST_ADDOPTS: "--cov-report=term-missing:skip-covered"
        run: |
          echo "### Test coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          uv run pytest >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: dbt parse
        run: uv run dbt parse --project-dir dbt --profiles-dir dbt --target docker

      - name: Dependency audit (pip-audit)
        # CVE-2025-62727: starlette 0.48.0, transitive dep of Airflow (dev only)
        run: uv run pip-audit --ignore-vuln CVE-2025-62727

  security:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # https://github.com/gitleaks/gitleaks-action
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
