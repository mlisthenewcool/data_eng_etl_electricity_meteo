datasets:
  # ============================================================
  # REMOTE DATASETS (Silver - from HTTP sources)
  # ============================================================

  ign_contours_iris:
    description: "La base de données de référence pour la diffusion infra-communale des résultats du recensement de la population par Iris, de précision décamétrique"
    primary_key: "code_iris"
    source:
      provider: "IGN"
      url: "https://data.geopf.fr/telechargement/download/CONTOURS-IRIS/CONTOURS-IRIS_3-0__GPKG_LAMB93_FXX_2025-01-01/CONTOURS-IRIS_3-0__GPKG_LAMB93_FXX_2025-01-01.7z"
      format: "7z"
      inner_file: "iris.gpkg"
    ingestion:
      frequency: "daily"
      mode: "snapshot"
    postgres:
      table: "dim_contours_iris"

  odre_installations:
    description: "Registre national des installations de production et stockage d'électricité"
    primary_key: "id_peps"
    source:
      provider: "ODRE"
      url: "https://object.files.data.gouv.fr/hydra-parquet/hydra-parquet/c14e5a7d-2ca6-4ad8-bc61-93889d13fc25.parquet"
      format: "parquet"
    ingestion:
      frequency: "daily"
      mode: "snapshot"
    postgres:
      table: "dim_installations"

  odre_eco2mix_cons_def:
    description: "Production électrique régionale eco2mix (consolidées et définitives)"
    primary_key: [ "code_insee_region", "date_heure" ]
    source:
      provider: "ODRE"
      url: "https://odre.opendatasoft.com/api/explore/v2.1/catalog/datasets/eco2mix-regional-cons-def/exports/parquet?lang=fr&timezone=Europe%2FBerlin"
      format: "parquet"
    ingestion:
      frequency: "daily" # TODO[prod]: change to weekly or monthly
      mode: "snapshot"
    postgres:
      table: "fact_eco2mix_cons_def"

  odre_eco2mix_tr:
    description: "Production électrique régionale eco2mix (temps réel)"
    primary_key: [ "code_insee_region", "date_heure" ]
    source:
      provider: "ODRE"
      url: "https://odre.opendatasoft.com/api/explore/v2.1/catalog/datasets/eco2mix-regional-tr/exports/parquet?lang=fr&timezone=Europe%2FBerlin"
      format: "parquet"
    ingestion:
      frequency: "hourly"
      mode: "snapshot" # TODO: à passer en incremental
    postgres:
      table: "fact_eco2mix_tr"

  meteo_france_stations:
    description: "Liste des stations météorologiques de Météo France avec accès aux caractéristiques détaillées."
    primary_key: "id"
    # url_description: "https://www.data.gouv.fr/datasets/informations-sur-les-stations-metadonnees"
    source:
      provider: "MétéoFrance"
      # url: "https://object.files.data.gouv.fr/meteofrance/data/synchro_ftp/BASE/METADONNEES_STATION/fiches.json"
      url: "https://www.data.gouv.fr/api/1/datasets/r/1fe544d8-4615-4642-a307-5956a7d90922"
      format: "json"
    ingestion:
      frequency: "daily"
      mode: "snapshot"
    postgres:
      table: "dim_stations_meteo"

  meteo_france_climatologie:
    description: "Données climatologiques horaires de Météo France (2 dernières années, 95 départements France métropolitaine)"
    primary_key: [ "id_station", "date_heure" ]
    source:
      provider: "MétéoFrance"
      # Custom multi-file download : 95 fichiers par département (Parquet Hydra si dispo, sinon CSV.gz)
      # Le téléchargement est géré par utils/meteo_download.py, pas le pipeline standard
      # Doc API climatologie : https://portail-api.meteofrance.fr/web/fr/api/DonneesPubliquesClimatologie
      url: "https://object.files.data.gouv.fr/meteofrance/data/synchro_ftp/BASE/HOR/"
      format: "csv_gz"
    ingestion:
      frequency: "daily"
      mode: "incremental"
    postgres:
      table: "fact_meteo_horaire"

  # ============================================================
  # DERIVED DATASETS (Gold - built from Silver sources)
  # ============================================================

  installations_meteo:
    description: "Installations de production d'énergie renouvelable avec station météo la plus proche. Le lien géographique est assuré par la maille IRIS."
    source:
      depends_on:
        - odre_installations
        - ign_contours_iris
        - meteo_france_stations